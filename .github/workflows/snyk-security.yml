name: Snyk Security Scan

on: [push, pull_request]

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Snyk and HTML Generator
        run: npm install -g snyk snyk-to-html

      - name: Authenticate and Generate Report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # The true statement ensures the pipeline doesn't fail before archiving if vulnerabilities are found
        run: |
          snyk test --json | snyk-to-html -o snyk-report.html || true

      - name: Package Report into ZIP
        run: zip -r snyk-report.zip snyk-report.html

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-security-report
          path: snyk-report.zip
